name: Repository Metrics

on:
  workflow_call:
    inputs:
      exclude-dirs:
        description: "Comma-separated directories to exclude"
        required: false
        default: ".git,node_modules,dist,build,external,.venv,__pycache__"
        type: string
      tag:
        description: "Release tag to embed in metrics.json (defaults to short SHA)"
        required: false
        default: ""
        type: string
    outputs:
      metrics-json-path:
        description: "Workspace-relative path to the synthesised metrics.json"
        value: ${{ jobs.collect.outputs.metrics_json_path }}

jobs:
  collect:
    name: Collect Metrics
    runs-on: ubuntu-latest
    outputs:
      metrics_json_path: ${{ steps.synth.outputs.path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        run: |
          cargo install tokei --locked
          sudo apt-get update && sudo apt-get install -y cloc tree jq

      - name: Collect metrics
        run: |
          EXCLUDES="${{ inputs.exclude-dirs }}"
          mkdir -p metrics

          # tokei
          tokei --exclude "$EXCLUDES" --exclude "package-lock.json" --output json > metrics/tokei.json
          tokei --exclude "$EXCLUDES" --exclude "package-lock.json" > metrics/tokei.txt

          # cloc
          cloc . --exclude-dir=$EXCLUDES --json --out=metrics/cloc.json

          # tree
          TREE_EXCLUDE=$(echo "$EXCLUDES" | tr ',' '|')
          tree -a -I "$TREE_EXCLUDE" > metrics/tree.txt

          # metadata
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{repo: $repo, sha: $sha, timestamp: $ts}' > metrics/meta.json

      - name: Synthesise metrics.json
        id: synth
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG=$(git rev-parse --short HEAD); fi
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg tag  "$TAG" \
            --arg sha  "${{ github.sha }}" \
            --arg ts   "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile tokei metrics/tokei.json \
            '{
              repo: $repo, tag: $tag, sha: $sha, collected_at: $ts,
              tokei: $tokei[0]
            }' > metrics/metrics.json
          echo "path=metrics/metrics.json" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ github.event.repository.name }}-${{ github.run_number }}
          path: metrics/
          retention-days: 90

      - name: Generate summary
        run: |
          {
            echo "## Repository Metrics"
            echo ""
            echo "### Lines of Code (tokei)"
            echo '```'
            cat metrics/tokei.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
